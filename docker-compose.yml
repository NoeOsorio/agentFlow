services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agentflow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      AGENTFLOW_ENV: development
      AGENTFLOW_SECRET_KEY: dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src  # hot reload in dev
    command: uvicorn agentflow_api.main:app --host 0.0.0.0 --port 8000 --reload

  runtime:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      AGENTFLOW_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/runtime/src:/app/src  # hot reload in dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
