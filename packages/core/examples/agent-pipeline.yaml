apiVersion: agentflow.ai/v1
kind: Pipeline
metadata:
  name: feature-development
  namespace: default
  labels:
    team: engineering
spec:
  company_ref:
    name: acme-corp
    namespace: default

  nodes:
    - id: start
      type: start
      outputs:
        - key: feature_description
          type: string
          required: true

    - id: plan
      type: agent_pod
      agent_ref:
        name: alice
        namespace: default
      instruction: "Plan the implementation for: {{#start.feature_description#}}"

    - id: implement
      type: agent_pod
      agent_ref:
        name: alice
        namespace: default
      instruction: "Implement the plan: {{#plan.output#}}"

    - id: end
      type: end
      inputs:
        - node_id: implement
          variable: output

  edges:
    - id: edge-start-plan
      source: start
      target: plan
    - id: edge-plan-implement
      source: plan
      target: implement
    - id: edge-implement-end
      source: implement
      target: end
