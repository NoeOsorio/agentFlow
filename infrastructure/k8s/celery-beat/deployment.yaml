apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentflow-celery-beat
  namespace: agentflow
  labels:
    app: agentflow-celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentflow-celery-beat
  template:
    metadata:
      labels:
        app: agentflow-celery-beat
    spec:
      containers:
        - name: celery-beat
          image: agentflow/api:latest
          command: ["celery", "-A", "agentflow_api.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: agentflow-config
            - secretRef:
                name: agentflow-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
