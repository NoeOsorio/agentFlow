apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentflow-runtime
  namespace: agentflow
  labels:
    app: agentflow-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentflow-runtime
  template:
    metadata:
      labels:
        app: agentflow-runtime
    spec:
      containers:
        - name: runtime
          image: agentflow/runtime:latest
          envFrom:
            - configMapRef:
                name: agentflow-config
            - secretRef:
                name: agentflow-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
