# IMPORTANT: Do not commit real values. Use kubectl create secret or external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: agentflow-secrets
  namespace: agentflow
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:CHANGE_ME@postgres:5432/agentflow"
  AGENTFLOW_SECRET_KEY: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  OPENAI_API_KEY: "CHANGE_ME"
